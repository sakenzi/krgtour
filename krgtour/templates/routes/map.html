{% extends "base.html" %}

{% block title %}Карта маршрутов — КарагандаТур{% endblock %}

{% block extra_css %}
<style>
body { overflow: hidden; }

.main-content {
    height: calc(100vh - var(--nav-height));
    margin-top: var(--nav-height);
    position: relative;
    overflow: hidden;
}

/* Сайдбар */
.map-sidebar {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 360px;
    background: white;
    box-shadow: var(--shadow-xl);
    z-index: 500;
    display: flex;
    flex-direction: column;
    transition: transform var(--transition-slow);
}
.map-sidebar.collapsed { transform: translateX(-360px); }

/* Кнопка сворачивания */
.sidebar-toggle {
    position: absolute;
    top: 16px;
    left: 376px;
    z-index: 600;
    width: 44px; height: 44px;
    background: white;
    border-radius: 50%;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-md);
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: left var(--transition-slow);
}
.map-sidebar.collapsed ~ .sidebar-toggle,
.sidebar-toggle.collapsed { left: 16px; }

/* Карта — занимает всё место справа от сайдбара */
#fullPageMap {
    position: absolute;
    top: 0; bottom: 0;
    left: 360px; right: 0;
    transition: left var(--transition-slow);
}
#fullPageMap.sidebar-hidden { left: 0; }

/* Блоки сайдбара */
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-search { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-filters {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
    overflow-x: auto; flex-shrink: 0;
    scrollbar-width: none;
}
.sidebar-filters::-webkit-scrollbar { display: none; }
.sidebar-results { flex: 1; overflow-y: auto; padding: 12px; }

.sidebar-route-item {
    padding: 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all var(--transition);
    display: flex; gap: 12px;
}
.sidebar-route-item:hover {
    border-color: var(--primary);
    background: var(--purple-50);
}
.sidebar-route-thumb {
    width: 64px; height: 64px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
    background: linear-gradient(135deg, #1E0B4B, #4C1D95);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
}
.sidebar-route-info { flex: 1; min-width: 0; }
.sidebar-route-title {
    font-weight: 600; font-size: 0.875rem; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-route-meta { font-size: 0.78rem; color: var(--text-muted); display: flex; gap: 8px; }

/* Leaflet z-index fix */
.leaflet-top, .leaflet-bottom { z-index: 400; }
</style>
{% endblock %}

{% block footer %}{% endblock %}

{% block content %}

<!-- Сайдбар -->
<div class="map-sidebar" id="mapSidebar">
    <div class="sidebar-header">
        <h2 style="font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; margin-bottom: 4px;">🗺 Карта маршрутов</h2>
        <p style="font-size: 0.8rem; color: var(--text-muted);">Кликните на маркер для информации</p>
    </div>

    <div class="sidebar-search">
        <div style="position: relative;">
            <input type="text" id="sidebarSearch" class="form-input"
                   placeholder="Поиск маршрутов..."
                   style="padding-left: 36px; padding-top: 9px; padding-bottom: 9px; font-size: 0.85rem;">
            <span style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.9rem;">🔍</span>
        </div>
    </div>

    <div class="sidebar-filters">
        <button class="category-chip active" data-filter="">Все</button>
        <button class="category-chip" data-filter="easy" style="color: var(--success);">🟢 Лёгкие</button>
        <button class="category-chip" data-filter="medium" style="color: var(--warning);">🟡 Средние</button>
        <button class="category-chip" data-filter="hard" style="color: var(--error);">🔴 Сложные</button>
        <button class="category-chip" data-filter="places">📍 Места</button>
    </div>

    <div class="sidebar-results" id="sidebarResults">
        <div style="text-align: center; padding: 40px; color: var(--text-muted);">Загрузка...</div>
    </div>
</div>

<!-- Кнопка сворачивания (снаружи сайдбара) -->
<button class="sidebar-toggle" id="sidebarToggle" title="Скрыть/показать панель">☰</button>

<!-- Карта -->
<div id="fullPageMap"></div>

{% endblock %}

{% block extra_js %}
<script src="/static/js/map.js"></script>
<script>
(function () {
    // ── Данные из Django ──────────────────────────────────────────────────────
    var routesData = [];
    var placesData = [];

    try { routesData = {{ routes_json|default:"[]"|safe }}; } catch (e) { console.error('routes parse error', e); }
    try { placesData = {{ places_json|default:"[]"|safe }}; } catch (e) { console.error('places parse error', e); }

    var mapLat  = parseFloat('{{ map_lat|default:"49.8047" }}')  || 49.8047;
    var mapLng  = parseFloat('{{ map_lng|default:"73.1094" }}')  || 73.1094;
    var mapZoom = parseInt('{{ map_zoom|default:"11" }}', 10)    || 11;

    // ── Инициализация карты ───────────────────────────────────────────────────
    var map = KGDMap.initMap('fullPageMap', { center: [mapLat, mapLng], zoom: mapZoom });
    if (!map) { console.error('Map init failed'); return; }

    var routeMarkers = [];
    var placeMarkers = [];

    // ── Иконки ───────────────────────────────────────────────────────────────
    function createRouteIcon(difficulty) {
        var colors = { easy: '#10B981', medium: '#F59E0B', hard: '#EF4444', expert: '#7C3AED' };
        var color = colors[difficulty] || '#7C3AED';
        return L.divIcon({
            className: '',
            html: '<div style="width:36px;height:36px;background:' + color + ';border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);color:white;font-size:14px;">🏔</span></div>',
            iconSize: [36, 36], iconAnchor: [18, 36], popupAnchor: [0, -36]
        });
    }

    function createPlaceIcon(emoji) {
        return L.divIcon({
            className: '',
            html: '<div style="width:30px;height:30px;background:white;border-radius:50%;border:2px solid #7C3AED;box-shadow:0 2px 6px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;">' + (emoji || '📍') + '</div>',
            iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -30]
        });
    }

    // ── Маркеры маршрутов ─────────────────────────────────────────────────────
    routesData.forEach(function (route) {
        var lat = parseFloat(route.start_lat);
        var lng = parseFloat(route.start_lng);
        if (isNaN(lat) || isNaN(lng)) return;

        var marker = L.marker([lat, lng], { icon: createRouteIcon(route.difficulty) });
        marker.bindPopup(
            '<div class="map-popup">' +
                '<div class="map-popup-title">' + route.title + '</div>' +
                '<div class="map-popup-meta">' +
                    '<span>📏 ' + route.distance_km + ' км</span>' +
                    '<span>⏱ ' + route.duration_hours + ' ч</span>' +
                    (route.avg_rating ? '<span>⭐ ' + route.avg_rating + '</span>' : '') +
                '</div>' +
                '<a href="/routes/' + route.slug + '/" class="map-popup-link">Открыть →</a>' +
            '</div>',
            { closeButton: false }
        );
        marker.routeData = route;
        marker.addTo(map);
        routeMarkers.push(marker);
    });

    // ── Маркеры мест ──────────────────────────────────────────────────────────
    placesData.forEach(function (place) {
        var lat = parseFloat(place.lat);
        var lng = parseFloat(place.lng);
        if (isNaN(lat) || isNaN(lng)) return;

        var marker = L.marker([lat, lng], { icon: createPlaceIcon(place.icon || '📍') });
        marker.bindPopup(
            '<div class="map-popup">' +
                '<div class="map-popup-title">' + place.name + '</div>' +
                '<div class="map-popup-meta"><span>' + (place.category_name || '') + '</span></div>' +
                '<a href="/places/' + place.slug + '/" class="map-popup-link">Подробнее →</a>' +
            '</div>',
            { closeButton: false }
        );
        marker.placeData = place;
        marker.addTo(map);
        placeMarkers.push(marker);
    });

    // ── Сайдбар ───────────────────────────────────────────────────────────────
    function renderSidebar(routes) {
        var container = document.getElementById('sidebarResults');
        if (!container) return;
        if (!routes.length) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-muted);">Ничего не найдено</div>';
            return;
        }
        container.innerHTML = routes.map(function (r) {
            return '<div class="sidebar-route-item" onclick="window.location=\'/routes/' + r.slug + '/\'">' +
                '<div class="sidebar-route-thumb">🏔</div>' +
                '<div class="sidebar-route-info">' +
                    '<div class="sidebar-route-title">' + r.title + '</div>' +
                    '<div class="sidebar-route-meta">' +
                        '<span>📏 ' + r.distance_km + ' км</span>' +
                        '<span>⏱ ' + r.duration_hours + ' ч</span>' +
                    '</div>' +
                    (r.avg_rating ? '<div style="color:var(--accent);font-size:0.78rem;margin-top:2px;">⭐ ' + r.avg_rating + '</div>' : '') +
                '</div>' +
            '</div>';
        }).join('');
    }

    renderSidebar(routesData);

    // ── Поиск ─────────────────────────────────────────────────────────────────
    var searchInput = document.getElementById('sidebarSearch');
    if (searchInput) {
        searchInput.addEventListener('input', function () {
            var q = this.value.toLowerCase();
            renderSidebar(q
                ? routesData.filter(function (r) { return r.title.toLowerCase().indexOf(q) !== -1; })
                : routesData
            );
        });
    }

    // ── Фильтры ───────────────────────────────────────────────────────────────
    document.querySelectorAll('.sidebar-filters .category-chip').forEach(function (btn) {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.sidebar-filters .category-chip').forEach(function (b) {
                b.classList.remove('active');
            });
            this.classList.add('active');
            var filter = this.dataset.filter;
            if (filter === 'places') {
                renderSidebar([]);
                placeMarkers.forEach(function (m) { m.addTo(map); });
                routeMarkers.forEach(function (m) { map.removeLayer(m); });
            } else {
                var filtered = filter
                    ? routesData.filter(function (r) { return r.difficulty === filter; })
                    : routesData;
                renderSidebar(filtered);
                routeMarkers.forEach(function (m) { m.addTo(map); });
                placeMarkers.forEach(function (m) { map.removeLayer(m); });
            }
        });
    });

    // ── Сворачивание сайдбара ─────────────────────────────────────────────────
    var sidebar   = document.getElementById('mapSidebar');
    var mapEl     = document.getElementById('fullPageMap');
    var toggleBtn = document.getElementById('sidebarToggle');

    if (sidebar && toggleBtn && mapEl) {
        toggleBtn.addEventListener('click', function () {
            var isCollapsed = sidebar.classList.toggle('collapsed');
            mapEl.classList.toggle('sidebar-hidden', isCollapsed);
            toggleBtn.classList.toggle('collapsed', isCollapsed);
            // Дать CSS-transition завершиться, затем обновить Leaflet
            setTimeout(function () { map.invalidateSize(); }, 400);
        });
    }

})();
</script>
{% endblock %}
