{% extends "base.html" %}
{% block title %}Ошибка сервера — КарагандаТур{% endblock %}
{% block content %}
<div style="min-height: calc(100vh - var(--nav-height)); margin-top: var(--nav-height); display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px;">
    <div>
        <div style="font-size: 6rem; margin-bottom: 16px;">⚠️</div>
